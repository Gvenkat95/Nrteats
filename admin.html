<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nrteats | Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="admin-body">
    
    <!-- Login Overlay -->
    <div id="admin-login-overlay" class="admin-login-overlay">
        <div class="login-box">
            <div class="login-logo">
                <i class="fas fa-user-shield"></i>
            </div>
            <h2>Admin Access</h2>
            <p>Please enter your credentials</p>
            <input type="password" id="admin-password" placeholder="Enter password (try 'admin')">
            <button id="admin-login-btn">Login</button>
            <p id="login-error" class="error-msg"></p>
        </div>
    </div>

    <!-- Main Dashboard -->
    <div class="admin-container" id="admin-dashboard" style="display: none;">
        <!-- Sidebar -->
        <aside class="admin-sidebar">
            <div class="admin-brand">
                <i class="fas fa-burger"></i>
                <span>Nrteats Admin</span>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="active"><i class="fas fa-chart-pie"></i> Dashboard</a>
                <a href="#"><i class="fas fa-clipboard-list"></i> Manage Orders</a>
                <a href="#"><i class="fas fa-users"></i> Customers</a>
                <a href="#"><i class="fas fa-cog"></i> Settings</a>
            </nav>
            <div class="sidebar-footer">
                <a href="index.html" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Exit Admin</a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="admin-main">
            <header class="admin-header">
                <div class="header-title">
                    <h2>Orders Dashboard</h2>
                    <p>Welcome back, Admin</p>
                </div>
                <div class="header-actions">
                    <button class="refresh-btn" onclick="location.reload()"><i class="fas fa-sync-alt"></i> Refresh</button>
                    <div class="admin-profile">
                        <img src="https://ui-avatars.com/api/?name=Admin&background=F68B1E&color=fff" alt="Admin">
                    </div>
                </div>
            </header>

            <div class="dashboard-content">
                <!-- Stats Cards -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon bg-blue">
                            <i class="fas fa-shopping-bag"></i>
                        </div>
                        <div class="stat-details">
                            <p>Total Orders</p>
                            <h3 id="stat-total">0</h3>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon bg-orange">
                            <i class="fas fa-clock"></i>
                        </div>
                        <div class="stat-details">
                            <p>Pending</p>
                            <h3 id="stat-pending">0</h3>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon bg-green">
                            <i class="fas fa-check-circle"></i>
                        </div>
                        <div class="stat-details">
                            <p>Completed</p>
                            <h3 id="stat-completed">0</h3>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon bg-purple">
                            <i class="fas fa-wallet"></i>
                        </div>
                        <div class="stat-details">
                            <p>Revenue</p>
                            <h3 id="stat-revenue">₹0</h3>
                        </div>
                    </div>
                </div>

                <!-- Orders Table -->
                <div class="orders-section">
                    <div class="section-header">
                        <h3>Recent Orders</h3>
                        <div class="filter-group">
                            <select id="status-filter">
                                <option value="all">All Orders</option>
                                <option value="Pending">Pending</option>
                                <option value="Preparing">Preparing</option>
                                <option value="Delivered">Delivered</option>
                                <option value="Cancelled">Cancelled</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="table-responsive">
                        <table class="orders-table">
                            <thead>
                                <tr>
                                    <th>Order ID</th>
                                    <th>Customer</th>
                                    <th>Items</th>
                                    <th>Total</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="orders-tbody">
                                <!-- Orders will be populated here via JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="admin.js"></script>
</body>
</html>
